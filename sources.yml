# --- cpdf + camlpdf (PDF command-line tool) ---
camlpdf:
  version: "2.8.1"
  url: "https://github.com/johnwhitington/camlpdf/archive/refs/tags/v2.8.1.tar.gz"
  md5: "93883956f317d4037341b6a0da8a6d03"
  notes: "OCaml PDF library — dependency of cpdf.  Uses OCamlMakefile; dune overlay in dune-overlays/camlpdf/."

cpdf-source:
  version: "2.8.1"
  url: "https://github.com/johnwhitington/cpdf-source/archive/refs/tags/v2.8.1.tar.gz"
  md5: "45ba51aae6b5d3ea6cb421037f8f73bb"
  notes: "PDF command-line tool.  Uses OCamlMakefile; dune overlay in dune-overlays/cpdf-source/."

# --- rocq / coq (proof assistant) ---
zarith:
  version: "1.14"
  url: "https://github.com/ocaml/Zarith/archive/refs/tags/release-1.14.tar.gz"
  md5: "05ef6f78ebea92aa5c3ff35bbfd29bf9"
  notes: "GMP wrapper.  Uses configure/make; dune overlay in dune-overlays/zarith/.  System dep: libgmp-dev."

rocq:
  version: "9.0.0"
  url: "https://github.com/rocq-prover/rocq/archive/refs/tags/V9.0.0.tar.gz"
  md5: "e6c2f84353384300a47b2e90d6824229"
  notes: "Proof assistant (formerly Coq).  Uses dune natively.  Needs dunestrap + findlib library."

